name: Build APK
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - name: Scaffold Flutter project
        run: flutter create --org com.wheel --project-name wheel_app build_app
      - name: Inject sources
        run: |
          cp app_src/pubspec.yaml build_app/pubspec.yaml
          cp app_src/lib/main.dart build_app/lib/main.dart
      - name: Build release APK
        working-directory: build_app
        run: |
          flutter pub get
          flutter build apk --release
      - uses: actions/upload-artifact@v4
        with:
          name: wheel-app-apk
          path: build_app/build/app/outputs/flutter-apk/app-release.apk
